<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <title>{{ if .Params.seo_title }}{{ .Params.seo_title }}{{ else if .IsHome }}Hardwood Flooring in Helena, Bozeman & Butte, MT | Traver Hardwood Floors{{ else if eq .Section "projects" }}{{ .Title }} | {{ .Site.Title }}{{ else }}{{ .Title }} | Helena & Bozeman, MT | {{ .Site.Title }}{{ end }}</title>

  <!-- Canonical URL -->
  <link rel="canonical" href="{{ .Permalink }}">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:title" content="{{ if .Params.seo_title }}{{ .Params.seo_title }}{{ else if .IsHome }}Hardwood Flooring in Helena, Bozeman & Butte, MT | Traver Hardwood Floors{{ else if eq .Section "projects" }}{{ .Title }} | {{ .Site.Title }}{{ else }}{{ .Title }} | Helena & Bozeman, MT | {{ .Site.Title }}{{ end }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:image" content="{{ if .Params.featured_image }}{{ .Params.featured_image | absURL }}{{ else }}{{ "images/og-image.jpg" | absURL }}{{ end }}">
  <meta property="og:site_name" content="{{ .Site.Title }}">
  <meta property="og:locale" content="en_US">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ if .Params.seo_title }}{{ .Params.seo_title }}{{ else if .IsHome }}Hardwood Flooring in Helena, Bozeman & Butte, MT | Traver Hardwood Floors{{ else if eq .Section "projects" }}{{ .Title }} | {{ .Site.Title }}{{ else }}{{ .Title }} | Helena & Bozeman, MT | {{ .Site.Title }}{{ end }}">
  <meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta name="twitter:image" content="{{ if .Params.featured_image }}{{ .Params.featured_image | absURL }}{{ else }}{{ "images/og-image.jpg" | absURL }}{{ end }}">

  <!-- Geo Tags for Local SEO -->
  <meta name="geo.region" content="US-MT">
  <meta name="geo.placename" content="Helena, Montana">

  <!-- Favicon -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#2E2318">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Main CSS -->
  {{ $style := resources.Get "css/main.css" | minify }}
  <link rel="stylesheet" href="{{ $style.RelPermalink }}">

  <!-- Plausible Analytics -->
  <script defer data-domain="traverhardwoodfloors.com" src="https://plausible.angmar.dev/js/script.js"></script>

  <!-- Google tag (gtag.js) -->

  <script>

  <!-- Alpine.js -->

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>

  <!-- LocalBusiness Schema Markup -->
  <script type="application/ld+json">
  {

    "@type": "HomeAndConstructionBusiness",

    "description": "{{ .Site.Params.description }}",
    "url": "{{ .Site.BaseURL }}",
    "telephone": "{{ .Site.Params.phoneTel }}",
    "image": "{{ "images/og-image.jpg" | absURL }}",
    "logo": "{{ "images/logo.png" | absURL }}",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Helena",
      "addressRegion": "MT",
      "addressCountry": "US"
    },
    "geo": {
      "@type": "GeoCoordinates",
      "latitude": "46.5958",
      "longitude": "-112.0270"
    },
    "areaServed": [
      {
        "@type": "City",
        "name": "Helena, Montana"
      },
      {
        "@type": "City",
        "name": "Bozeman, Montana"
      },
      {
        "@type": "City",
        "name": "Butte, Montana"
      },
      {
        "@type": "City",
        "name": "Great Falls, Montana"
      },
      {
        "@type": "City",
        "name": "Missoula, Montana"
      }
    ],
    "priceRange": "$$",
    "openingHoursSpecification": {
      "@type": "OpeningHoursSpecification",
      "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
      "opens": "08:00",
      "closes": "17:00"
    },
    "sameAs": [
      "{{ .Site.Params.social.facebook }}",
      "{{ .Site.Params.social.instagram }}",
      "{{ .Site.Params.social.nextdoor }}",
      "{{ .Site.Params.social.google }}"
    ],
    "hasOfferCatalog": {
      "@type": "OfferCatalog",
      "name": "Hardwood Flooring Services",
      "itemListElement": [
        {
          "@type": "Offer",
          "itemOffered": {
            "@type": "Service",
            "name": "Hardwood Floor Installation"
          }
        },
        {
          "@type": "Offer",
          "itemOffered": {
            "@type": "Service",
            "name": "Hardwood Floor Sanding & Finishing"
          }
        },
        {
          "@type": "Offer",
          "itemOffered": {
            "@type": "Service",
            "name": "Hardwood Floor Repair & Restoration"
          }
        },
        {
          "@type": "Offer",
          "itemOffered": {
            "@type": "Service",
            "name": "Custom Hardwood Stairs"
          }
        }
      ]
    }
  }
  </script>

  {{ block "head" . }}{{ end }}
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  {{ partial "header.html" . }}

  <main id="main-content">
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}

  <!-- Mobile Menu Script -->
  <script>
    function toggleMobileMenu() {
      const menu = document.getElementById('mobile-menu');
      const hamburger = document.getElementById('hamburger');
      const isOpen = menu.classList.toggle('active');
      hamburger.classList.toggle('active');
      hamburger.setAttribute('aria-expanded', isOpen);
      document.body.classList.toggle('menu-open', isOpen);
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        const menu = document.getElementById('mobile-menu');
        const hamburger = document.getElementById('hamburger');
        if (menu.classList.contains('active')) {
          menu.classList.remove('active');
          hamburger.classList.remove('active');
          hamburger.setAttribute('aria-expanded', 'false');
          document.body.classList.remove('menu-open');
          hamburger.focus();
        }
      }
    });
  </script>

  <!-- Facebook Pixel (deferred to end of body) -->
  <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '876484957710949');
    fbq('track', 'PageView');
  </script>
  <noscript>
    <img height="1" width="1" alt="" style="display:none" src="https://www.facebook.com/tr?id=876484957710949&ev=PageView&noscript=1"/>

  {{ block "scripts" . }}{{ end }}
</body>
</html>
