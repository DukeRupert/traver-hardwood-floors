<header class="site-header">
  <nav class="nav-container" aria-label="Main navigation">
    <a href="/" class="logo">
      <picture>
        <source srcset="/images/logo.webp, /images/logo@2x.webp 2x" type="image/webp">
        <img src="/images/logo.png" alt="Traver Hardwood Floors" class="logo-img" width="200" height="200">
      </picture>
    </a>

    <div class="nav-actions-mobile">
      <a href="tel:{{ .Site.Params.phoneTel }}" class="header-phone-btn" aria-label="Call {{ .Site.Params.phoneFormatted }}">
        <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
        </svg>
        <span class="header-phone-label">Call</span>
      </a>
      <button class="hamburger" id="hamburger" onclick="toggleMobileMenu()" aria-label="Main menu" aria-expanded="false" aria-controls="mobile-menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>

    <div class="nav-menu" id="mobile-menu">
      <ul class="nav-links">
        {{ range .Site.Menus.main }}
        {{ if eq .URL "/services/" }}
        <li class="nav-dropdown">
          <a href="{{ .URL }}" {{ if $.IsMenuCurrent "main" . }}class="active" aria-current="page"{{ end }}>{{ .Name }}</a>
          <button class="nav-dropdown-toggle" aria-label="Toggle services menu" aria-expanded="false" onclick="this.classList.toggle('open'); this.nextElementSibling.classList.toggle('active'); this.setAttribute('aria-expanded', this.classList.contains('open'))">&#9662;</button>
          <ul class="nav-dropdown-menu">
            {{ range $.Site.Menus.services }}
            <li><a href="{{ .URL }}">{{ .Name }}</a></li>
            {{ end }}
          </ul>
        </li>
        {{ else }}
        <li><a href="{{ .URL }}" {{ if $.IsMenuCurrent "main" . }}class="active" aria-current="page"{{ end }}>{{ .Name }}</a></li>
        {{ end }}
        {{ end }}
      </ul>

      <div class="nav-cta-group">
        <a href="tel:{{ .Site.Params.phoneTel }}" class="header-phone-btn header-phone-btn--desktop">
          <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
          </svg>
          {{ .Site.Params.phoneFormatted }}
        </a>
        <a href="tel:{{ .Site.Params.phoneTel }}" class="btn btn-phone nav-phone-mobile-menu">
          <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
          </svg>
          Call {{ .Site.Params.phoneFormatted }}
        </a>
      </div>
    </div>
  </nav>
</header>
